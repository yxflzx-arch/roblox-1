<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox 福利中心</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:"Microsoft JhengHei",sans-serif;

background:url("bg.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

.card{
width:420px;
padding:35px;
border-radius:30px;
background:transparent;
backdrop-filter:none;
text-align:center;
color:white;
}

.avatar{
width:140px;
height:140px;
border-radius:25px;
object-fit:cover;
border:4px solid white;
}

.name{
font-size:36px;
font-weight:900;
margin-top:20px;
}

.desc{
font-size:18px;
margin-top:10px;
}

.btn{
display:block;
margin-top:30px;
padding:18px;
background:#0078ff;
border-radius:18px;
text-decoration:none;
color:white;
font-size:22px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

<img
class="avatar"
src="logo.jpg">

<div class="name">
Roblox 福利中心
</div>

<div class="desc">
官方福利活動入口
</div>

<a
class="btn"
href="https://lin.ee/y86Gkbr">
立即領取福利
</a>

</div>

</body>
</html>
